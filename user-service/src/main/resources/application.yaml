spring:
  security:
    user:
      name: "admin"
      password : "admin"

  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/userservice
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # options: none, validate, update, create, create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

    sql:
      init:
        mode: always   # runs schema.sql and data.sql if present